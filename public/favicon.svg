<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="N squared neon favicon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07101f"/>
      <stop offset="100%" stop-color="#020713"/>
    </linearGradient>

    <linearGradient id="borderGrad" x1="0.05" y1="0.05" x2="0.95" y2="0.95">
      <stop offset="0%" stop-color="#18e7ff"/>
      <stop offset="55%" stop-color="#2d7dff"/>
      <stop offset="100%" stop-color="#7a2cff"/>
    </linearGradient>

    <linearGradient id="nGrad" x1="0.12" y1="0.05" x2="0.88" y2="0.95">
      <stop offset="0%" stop-color="#16d8f4"/>
      <stop offset="52%" stop-color="#2787ff"/>
      <stop offset="100%" stop-color="#742dff"/>
    </linearGradient>

    <radialGradient id="panelGlow" cx="50%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#183064" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#020713" stop-opacity="0"/>
    </radialGradient>

    <filter id="borderGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="logoGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="92" fill="#000"/>
  <rect x="28" y="28" width="456" height="456" rx="84" fill="url(#bg)"/>
  <rect x="36" y="36" width="440" height="440" rx="78"
        fill="none" stroke="url(#borderGrad)" stroke-width="4.5"
        filter="url(#borderGlow)"/>
  <rect x="40" y="40" width="432" height="432" rx="74" fill="url(#panelGlow)"/>

  <g filter="url(#logoGlow)">
    <path fill="url(#nGrad)" d="
      M154 174
      H203
      L285 288
      V174
      H333
      V340
      H285
      L203 226
      V340
      H154
      Z"/>
  </g>

  <!-- 2 moved slightly higher, still close to N -->
  <text x="361" y="164"
        fill="#ffffff"
        font-family="Arial, Helvetica, sans-serif"
        font-size="72"
        font-weight="800"
        text-anchor="middle"
        dominant-baseline="hanging"
        filter="url(#logoGlow)">2</text>
</svg>
